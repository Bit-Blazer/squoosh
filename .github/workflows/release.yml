name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_npm:
        description: 'Publish squoosh-node and CLI to npm'
        required: true
        type: boolean
        default: false
      deploy_site:
        description: 'Deploy site to GitHub Pages'
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy-site:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_site == 'true')
    steps:
      - uses: actions/checkout@v6
      
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-packages:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm == 'true')
    steps:
      - uses: actions/checkout@v6
      
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies (squoosh-node)
        run: npm install
        working-directory: ./squoosh-node

      - name: Build (squoosh-node)
        run: npm run build
        working-directory: ./squoosh-node

      - name: Publish (squoosh-node)
        run: npm publish --provenance --access public
        working-directory: ./squoosh-node

      - name: Wait for NPM registry propagation
        run: sleep 45

      - name: Install dependencies (CLI)
        run: npm install
        working-directory: ./squoosh-cli

      - name: Publish (CLI)
        run: npm publish --provenance --access public
        working-directory: ./squoosh-cli

      - name: Wait for NPM registry propagation
        run: sleep 45

      - name: Install dependencies (squoosh browser)
        run: npm install
        working-directory: ./squoosh

      - name: Build (squoosh browser)
        run: npm run build
        working-directory: ./squoosh

      - name: Publish (squoosh browser)
        run: npm publish --provenance --access public
        working-directory: ./squoosh
